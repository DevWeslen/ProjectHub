<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Certificados | Weslen</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- HEADER -->
  <header class="bg-slate-900 text-white p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="flex items-center gap-3 text-2xl font-bold">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z" />
        </svg>
        Meus Certificados
      </h1>

      <a href="index.html" class="text-sm hover:underline">← Voltar</a>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main id="lista-certificados" class="max-w-5xl mx-auto p-4 space-y-6">
    <!-- Certificados serão renderizados via JS -->
  </main>

  <!-- MODAL Certificado -->
  <div
    id="modalCertificado"
    class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50"
  >
    <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl h-[85vh] relative">
      <button
        onclick="fecharCertificado()"
        class="absolute top-3 right-3 text-gray-600 hover:text-black text-xl font-bold"
      >
        ✕
      </button>
      <iframe
        id="iframeCertificado"
        class="w-full h-full rounded-b-lg"
        src=""
      ></iframe>
    </div>
  </div>

  <!-- JS -->
  <script src="js/modal.js"></script>
  <script src="js/certificados.js"></script>
  <script src="js/renderCertificados.js"></script>

</body>
</html>
